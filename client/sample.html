<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sessvm client sample</title>
    <style>
      :root {
        font-family: Georgia, "Times New Roman", serif;
        background: #f5efe1;
        color: #18221c;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(900px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 24px;
        background: linear-gradient(135deg, #fffaf0, #dfead2);
        box-shadow: 0 24px 70px rgba(24, 34, 28, 0.18);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 7vw, 72px);
        line-height: 0.95;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 12px;
        margin: 24px 0;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        cursor: pointer;
        color: #fffaf0;
        background: #25533c;
        font-weight: 700;
      }

      pre {
        min-height: 220px;
        overflow: auto;
        padding: 18px;
        border-radius: 18px;
        background: #152019;
        color: #dcf4cf;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>sessvm client</h1>
      <p>Manual client test page for refresh, HTTP, GraphQL, and WebSocket auth material.</p>
      <div class="grid">
        <button id="refresh">Refresh</button>
        <button id="http">HTTP</button>
        <button id="gql">GraphQL</button>
        <button id="ws">WebSocket</button>
      </div>
      <pre id="out">Ready.</pre>
    </main>

    <script type="module">
      import { sc } from "./refresh.js";

      const out = document.querySelector("#out");
      const auth = sc({
        ep: "/auth/refresh",
        se: location.protocol === "https:",
      });

      function show(label, value) {
        out.textContent = `${label}\n${JSON.stringify(value, null, 2)}`;
      }

      document.querySelector("#refresh").addEventListener("click", async () => {
        show("refresh", await auth.refresh());
      });

      document.querySelector("#http").addEventListener("click", async () => {
        const response = await auth.request("/api/profile");
        show("http", {
          status: response.status,
          text: await response.text(),
        });
      });

      document.querySelector("#gql").addEventListener("click", async () => {
        const response = await auth.gql("/graphql", {
          query: "query Me { me { id } }",
          operationName: "Me",
        });
        show("graphql", {
          status: response.status,
          json: await response.json(),
        });
      });

      document.querySelector("#ws").addEventListener("click", () => {
        show("websocket", auth.ws());
      });
    </script>
  </body>
</html>
